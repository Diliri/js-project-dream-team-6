<!-- Секція «Наші хвостики» — розмітка; дані підтягуються через pets-list.js -->
<section class="pets" id="search">
  <div class="container">
    <!-- Заголовок секції -->
    <div class="pets__header">
      <h2 class="pets__title">Наші хвостики</h2>
      <p class="pets__subtitle">Вони дуже чекають на знайомство з вами</p>
    </div>

    <!-- Фільтри категорій: «Всі» в HTML, решта — з API -->
    <div class="pets__filters">
      <button
        type="button"
        class="pets__filter-btn is-active"
        data-category-id=""
      >
        Всі
      </button>
    </div>

    <!-- Список карток тварин (рендериться JS) -->
    <ul class="pets__list"></ul>

    <!-- Кнопка пагінації «Показати більше» -->
    <div class="pets__actions">
      <button type="button" class="pets__load-more">Показати більше</button>
    </div>
  </div>

  <!-- Повноекранний лоадер під час запитів до API -->
  <div
    class="pets__loader hidden"
    role="status"
    aria-live="polite"
    aria-label="Завантаження"
  >
    <div class="pets__loader-overlay"></div>
    <div class="pets__loader-spinner"></div>
  </div>
</section>
